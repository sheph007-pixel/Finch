name: Auto-merge bot branches

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    # Only auto-merge PRs from claude/* or codex/* branches
    if: startsWith(github.head_ref, 'claude/') || startsWith(github.head_ref, 'codex/')
    runs-on: ubuntu-latest
    steps:
      - name: Auto-merge PR
        uses: actions/github-script@v7
        with:
          script: |
            // Wait for any status checks to settle
            await new Promise(r => setTimeout(r, 10000));

            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              merge_method: 'squash'
            });

            console.log(`Auto-merged PR #${context.payload.pull_request.number} from ${context.payload.pull_request.head.ref}`);
